<!DOCTYPE html>
<html lang="EN">
<head>
  <title>TagTuner</title>
  <link rel="stylesheet" href="tagtuner.css">
</head>
<body>
  <div class="header">
    <div class="play-icon">
      <img src="tagtuner-24.png" alt="tagtuner">
    </div>
    <div class="logo">TagTuner Spotify</div>
  </div>
  
  <div class="form-group">
    <label for="artist">ARTIST</label>
    <input type="text" id="artist" placeholder="Artist name">
  </div>
  
  <div class="form-group">
    <label for="title">TITLE</label>
    <input type="text" id="title" placeholder="Album/Playlist title">
  </div>
  
  <div class="form-group">
    <label for="url">URL</label>
    <input type="text" id="url" placeholder="Spotify URL">
  </div>
  
  <div class="button-group">
    <button id="scrapeButton" class="primary-btn">Get Infos</button>
  </div>
  
  <script src="tagtuner-chrome.js"></script>
</body>
</html>
